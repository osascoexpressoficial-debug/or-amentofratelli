<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OE App">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ea1d2c">
<link rel="manifest" href="../public/manifest.json">
<link rel="apple-touch-icon" href="../public/icons/icon-192.png">
<title>Osasco Express</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#ea1d2c;--bg:#f7f7f5;--white:#fff;--txt:#3e3e3e;--t2:#717171;--t3:#a0a0a0;--s1:#f2f1ee;--s2:#eae9e4;--border:#e0dfd9;--f:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;}
html,body{height:100%;background:var(--bg);font-family:var(--f);-webkit-font-smoothing:antialiased;overflow:hidden;}

/* Safe area support iOS */
.app{display:flex;flex-direction:column;height:100%;height:calc(100% + env(safe-area-inset-bottom));}

/* Header */
.header{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:12px;flex-shrink:0;}
.header-icon{width:34px;height:34px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.header-name{font-size:16px;font-weight:800;color:var(--txt);}
.header-sub{font-size:11px;color:var(--t3);}

/* Content frame */
.content{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;width:100%;height:100%;border:none;background:var(--bg);}
.screen.hidden{display:none;}

/* Bottom nav */
.bottom-nav{background:var(--white);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;cursor:pointer;color:var(--t3);font-family:var(--f);font-size:10px;font-weight:600;letter-spacing:.3px;transition:color .13s;-webkit-tap-highlight-color:transparent;}
.nav-tab.active{color:var(--red);}
.nav-tab-icon{font-size:20px;line-height:1;}
.nav-tab-label{}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">🛵</div>
    <div>
      <div class="header-name">Osasco Express</div>
      <div class="header-sub" id="screen-title">Dashboard Fratelli</div>
    </div>
  </div>

  <div class="content">
    <iframe id="screen-dashboard" class="screen" src="dashboard.html"></iframe>
    <iframe id="screen-orcamento" class="screen hidden" src="oe_orcamento.html"></iframe>
    <iframe id="screen-proposta" class="screen hidden" src="proposta_oe.html"></iframe>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab active" onclick="show('dashboard','Dashboard Fratelli',this)">
      <span class="nav-tab-icon">📊</span>
      <span class="nav-tab-label">Dashboard</span>
    </button>
    <button class="nav-tab" onclick="show('orcamento','Orçamento IA',this)">
      <span class="nav-tab-icon">🤖</span>
      <span class="nav-tab-label">Orçamento</span>
    </button>
    <button class="nav-tab" onclick="show('proposta','Proposta OE',this)">
      <span class="nav-tab-icon">📄</span>
      <span class="nav-tab-label">Proposta</span>
    </button>
  </nav>
</div>

<script>
function show(id, title, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + id).classList.remove('hidden');
  document.getElementById('screen-title').textContent = title;
  btn.classList.add('active');
}
// Register service worker para PWA offline
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../public/sw.js').catch(()=>{});
}
</script>
</body>
</html>
